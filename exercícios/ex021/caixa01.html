<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: aquamarine;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

           /* margin: auto; para ficar centralizado
                ou para simplificar (margin: 10px 20px 10px 30px , mas se for tudo igual - margin: 10px)
                O mesmo vale para padding: 10px por exepmlo.
                */

           margin-top: 20px;
           margin-right: 20px;
           margin-bottom: 40px;
           margin-left: 20px;

           /* Para centralizar na página: margin: 20px auto 40px auto; assim fica lateralmente centralizado e os valores top e bottom ficam do tamanha que eu quiser*/

           outline-width: 5px;
           outline-style: dashed;
           outline-color: blueviolet;

           /* Ou.. outline: 5px dashed blueviolet; */

        }

        a {
            border-width: 10px;
            border-style: solid;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
