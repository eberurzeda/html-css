<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e dimuna o tamanho do seu navegador</p>
    
    <picture><!-- As imagens sempre devem começar com a maior, e acima dela entram as menores com a tag "source type"-->
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudis em HTML5.</p>
        <!-- Formatos que preciso ter para todos os navegadores: MP3 - WAV - OGG-->
     <audio preload="metadata" autoplay controls>
        <source src="midia/Time - The Grey Room _ Clark Sims.mp3" type="audio/mpeg">
        <source src="midia/Time - The Grey Room _ Clark Sims.mp3" type="audio/ogg">
        <source src="midia/Time - The Grey Room _ Clark Sims.mp3" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. Clique <a href="midia/Time - The Grey Room _ Clark Sims.mp3">aqui</a> para baixar o arquivo MP3</p>

     </audio>

</body>
</html>
