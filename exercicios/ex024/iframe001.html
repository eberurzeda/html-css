<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>
    <style>
        iframe {
            width: 500px;
            height: 500px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>Testanto o uso de um iframe</h1>
    <p>
        Acessando o site do <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a>
       
        
        para aprender a programar.

    </p>

    <p><!-- Tamanho padrão 300x150
        Obs.: existem os parâmetros: framborder e scolling "yes ou no" -->
        Acessando o site do
        
        <iframe src="https://www.cursoemvideo.com" frameborder="0"></iframe>
         <a href="https://www.cursoemvideo.com" target="_blank""></a>
        
        para aprender a programar
    </p>

    <p>
        Meu repositório

        <iframe src="https://urzeda.com/" frameborder="0"></iframe>

        no Github!
    </p>
    
</body>
</html>
