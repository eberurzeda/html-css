<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-basis</title>
    <style>
        div.container { /*Pai*/
            background-color: bisque;

            display: flex;
            flex-flow: row nowrap;
        }
        div.item {/*Filho*/
            background-color: aqua;
            border: 1px solid black;
            text-align: center;
            flex-basis: 150px;
            
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">Outro tamanho</div>
        <div class="item">C</div>
        <div class="item">Outro tamanho maior</div>
        <div class="item">E</div>
        <div class="item">Conteúdo com outro tamanho ainda maior</div>
        <div class="item">G</div>

    </div>
</body>
</html>
